[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
vault = "BQGMXbQst6qc2dhDMgUGAa7wCaep4ggn4yYvuRS7g74f"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""

[test.validator]
# Use Surfpool instead of solana-test-validator:
#   Terminal 1: surfpool start --legacy-anchor-compatibility --watch
#   Terminal 2: anchor test --skip-local-validator
